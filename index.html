<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEDx Energy Background</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

import { EffectComposer }
from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";

import { RenderPass }
from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";

import { UnrealBloomPass }
from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";

const scene = new THREE.Scene();

const camera = new THREE.OrthographicCamera(
    -1,
    1,
    1,
    -1,
    0.1,
    10
);

camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio, 2)
);

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

const composer =
    new EffectComposer(renderer);

composer.addPass(
    new RenderPass(
        scene,
        camera
    )
);

const bloom =
    new UnrealBloomPass(
        new THREE.Vector2(
            window.innerWidth,
            window.innerHeight
        ),
        2.4,
        0.8,
        0.0
    );

composer.addPass(bloom);

const uniforms = {

    uTime: {
        value: 0
    },

    uMouse: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail1: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail2: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail3: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    }

};

const material =
new THREE.ShaderMaterial({

uniforms,

vertexShader: `

varying vec2 vUv;

void main(){

    vUv = uv;

    gl_Position =
        vec4(
            position,
            1.0
        );

}

`,

fragmentShader: `

precision highp float;

uniform float uTime;

uniform vec2 uMouse;
uniform vec2 uTrail1;
uniform vec2 uTrail2;
uniform vec2 uTrail3;

varying vec2 vUv;

float hash(vec2 p){

    return fract(
        sin(
            dot(
                p,
                vec2(
                    127.1,
                    311.7
                )
            )
        ) * 43758.5453
    );

}

float noise(vec2 p){

    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    vec2 u =
        f*f*(3.-2.*f);

    return mix(a,b,u.x)
        +(c-a)*u.y*(1.-u.x)
        +(d-b)*u.x*u.y;

}

float fbm(vec2 p){

    float v = 0.0;
    float a = 0.5;

    for(int i=0;i<6;i++){

        v += a*noise(p);

        p *= 2.0;

        a *= 0.5;

    }

    return v;

}

float influence(
    vec2 uv,
    vec2 point,
    float scale
){

    float d =
        distance(
            uv,
            point
        );

    float ripple =
        sin(
            d*40.0
            - uTime*5.0
        );

    ripple *=
        exp(
            -d*scale
        );

    return ripple;

}

void main(){

    vec2 uv = vUv;

    float t =
        uTime*0.12;

    vec2 p =
        uv*3.0;

    vec2 mouseForce =
        uv-uMouse;

    float md =
        length(mouseForce);

    p -=
        mouseForce*
        (
            0.9/
            (md+0.15)
        );

    p.x +=
        sin(
            p.y*2.5+t
        )*1.1;

    p.y +=
        cos(
            p.x*2.5-t
        )*1.1;

    p += vec2(
        sin(t+p.y),
        cos(t+p.x)
    )*0.4;

    float flow =
        fbm(p+t)
        *
        fbm(
            p*1.7-t
        );

    flow +=
        influence(
            uv,
            uMouse,
            5.0
        )*0.9;

    flow +=
        influence(
            uv,
            uTrail1,
            3.5
        )*0.7;

    flow +=
        influence(
            uv,
            uTrail2,
            2.5
        )*0.5;

    flow +=
        influence(
            uv,
            uTrail3,
            1.5
        )*0.4;

    flow =
        smoothstep(
            0.25,
            1.2,
            flow
        );

    vec3 color =
        vec3(0.0);

    color +=
        vec3(
            1.8,
            0.0,
            0.0
        )*flow;

    color +=
        vec3(
            6.0,
            0.2,
            0.2
        )*
        pow(
            flow,
            2.0
        );

    float crest =
        smoothstep(
            0.6,
            0.9,
            flow
        );

    color +=
        vec3(
            10.0,
            0.6,
            0.6
        )*
        crest*
        0.4;

    gl_FragColor =
        vec4(
            color,
            1.0
        );

}

`

});

const mesh =
new THREE.Mesh(
    new THREE.PlaneGeometry(
        2,
        2
    ),
    material
);

scene.add(mesh);

let target =
new THREE.Vector2(
    0.5,
    0.5
);

window.addEventListener(
    "mousemove",
    e => {

        target.set(
            e.clientX /
            window.innerWidth,

            1 -
            e.clientY /
            window.innerHeight
        );

    }
);

function animate(){

    requestAnimationFrame(
        animate
    );

    uniforms.uTime.value += 0.01;

    uniforms.uTrail3.value.lerp(
        uniforms.uTrail2.value,
        0.02
    );

    uniforms.uTrail2.value.lerp(
        uniforms.uTrail1.value,
        0.03
    );

    uniforms.uTrail1.value.lerp(
        uniforms.uMouse.value,
        0.05
    );

    uniforms.uMouse.value.lerp(
        target,
        0.10
    );

    composer.render();

}

animate();

window.addEventListener(
    "resize",
    () => {

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        composer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
