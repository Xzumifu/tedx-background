<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IITH-style Fluid Ink</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
}
canvas{ display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* ---------------- SETUP ---------------- */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* ---------------- RENDER TARGETS ---------------- */

const rtA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const rtB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

let prev = rtA;
let curr = rtB;

/* ---------------- UNIFORMS ---------------- */

const U = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0.5,0.5) },
    uVelocity: { value: new THREE.Vector2(0,0) },
    uPrev: { value: null }
};

/* ---------------- SHADER ---------------- */

const mat = new THREE.ShaderMaterial({

uniforms: U,

vertexShader: `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`,

fragmentShader: `
precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVelocity;
uniform sampler2D uPrev;

varying vec2 vUv;

/* ---------------- NOISE ---------------- */

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);

    vec2 u = f*f*(3.0-2.0*f);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

/* curl field */
vec2 curl(vec2 p){
    float e = 0.0012;

    float n1 = noise(p + vec2(0,e));
    float n2 = noise(p - vec2(0,e));
    float a = n1 - n2;

    float n3 = noise(p + vec2(e,0));
    float n4 = noise(p - vec2(e,0));
    float b = n3 - n4;

    return vec2(a,-b);
}

/* multi-scale flow (IMPORTANT FOR IITH LOOK) */
vec2 flowField(vec2 p, float t){

    vec2 f1 = curl(p * 1.2 + t * 0.2);   // macro flow
    vec2 f2 = curl(p * 2.8 - t * 0.3);   // micro turbulence

    return f1 * 0.7 + f2 * 0.3;
}

void main(){

    vec2 uv = vUv;
    float t = uTime * 0.1;

    /* ---------------- PREVIOUS STATE ---------------- */

    vec3 prevCol = texture2D(uPrev, uv).rgb;

    /* ---------------- FLOW ---------------- */

    vec2 p = uv * 2.0;

    vec2 flow = flowField(p, t);

    /* gentle global drift (TEDx/IITH signature motion) */
    flow += vec2(0.06, 0.02);

    p += flow * 0.45;

    /* ---------------- CURSOR (SOFT INJECTION ONLY) ---------------- */

    vec2 d = uv - uMouse;
    float dist = length(d);

    float influence = exp(-dist * dist * 6.0);

    vec2 swirl = vec2(-d.y, d.x);

    p += swirl * influence * 0.18;
    p += uVelocity * influence * 0.08;

    /* ---------------- DYE FIELD (SPARSE INK) ---------------- */

    float n1 = noise(p + t);
    float n2 = noise(p * 1.6 - t);

    float ink = mix(n1, n2, 0.5);

    /* IMPORTANT: lower density (fix blob issue) */
    ink = smoothstep(0.38, 0.72, ink);
    ink = pow(ink, 1.2);

    /* ---------------- BREAKUP (CRITICAL FIX FOR SINGLE BLOB) ---------------- */

    float breakup = noise(p * 3.5 - t);
    ink *= mix(0.65, 1.1, breakup);

    /* ---------------- DYE INJECTION (VERY SUBTLE) ---------------- */

    float inject = influence * 0.35;
    ink += inject;

    /* ---------------- TEMPORAL ACCUMULATION ---------------- */

    vec3 fresh = vec3(0.0);

/* thin mist */
fresh += vec3(0.10,0.09,0.09) * ink * 0.8;

/* controlled red core (NOT dominant) */
fresh += vec3(0.45,0.05,0.05) * pow(ink,1.8);

/* grey atmospheric blend */
float haze = smoothstep(0.2,0.9,ink);
fresh += vec3(0.18) * haze * 0.2;

/* velocity-based light reaction */
fresh += vec3(flow.x*0.03,0.0,flow.y*0.03);

/* ---------------- SMOOTH FEEDBACK ---------------- */

vec3 col = mix(prevCol * 0.94, fresh, 0.06);

/* ---------------- FINAL GRADING ---------------- */

float vignette = smoothstep(1.3,0.2,length(uv-0.5));

col *= vignette;

/* prevent over-red saturation */
col *= 0.9;

/* lift blacks (water feel, not paint) */
col += 0.012;

gl_FragColor = vec4(col,1.0);
}
`
});

/* ---------------- QUAD ---------------- */

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
scene.add(quad);

/* ---------------- MOUSE ---------------- */

let prevM = new THREE.Vector2();
let target = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{

    let mx = e.clientX / window.innerWidth;
    let my = 1 - e.clientY / window.innerHeight;

    U.uVelocity.value.x = (mx - prevM.x) * 4.0;
    U.uVelocity.value.y = (my - prevM.y) * 4.0;

    prevM.set(mx,my);
    target.set(mx,my);
});

/* ---------------- RESIZE ---------------- */

window.addEventListener("resize",()=>{
    renderer.setSize(window.innerWidth, window.innerHeight);
    rtA.setSize(window.innerWidth, window.innerHeight);
    rtB.setSize(window.innerWidth, window.innerHeight);
});

/* ---------------- LOOP ---------------- */

function animate(){

    requestAnimationFrame(animate);

    U.uTime.value += 0.016;

    U.uMouse.value.lerp(target,0.04);
    U.uVelocity.value.multiplyScalar(0.92);

    /* feedback */
    U.uPrev.value = prev.texture;

    renderer.setRenderTarget(curr);
    renderer.render(scene,camera);

    renderer.setRenderTarget(null);
    renderer.render(scene,camera);

    let temp = prev;
    prev = curr;
    curr = temp;
}

animate();

</script>

</body>
</html>
