<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();

window.addEventListener("resize", resize);

let t = 0;

const particles = [];

/* THREAD SHAPE */

function threadY(x){

    const center = canvas.height * 0.5;

    return center

        + Math.sin(x * 0.004 + t * 1.0) * 8

        + Math.sin(x * 0.012 + t * 0.6) * 4

        + Math.sin(x * 0.025 + t * 1.3) * 2;
}

/* EMBERS */

class Ember{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.side =
            Math.random() < 0.5 ? -1 : 1;

        this.vx =
            (Math.random()-0.5) * 0.05;

        this.vy =
            this.side *
            (0.05 + Math.random()*0.08);

        this.life = 1;

        this.size =
            0.8 + Math.random()*1.2;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.002;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowColor = "#ff6633";
        ctx.shadowBlur = 8;

        ctx.fillStyle = "#ff8855";

        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );
        ctx.fill();

        ctx.restore();
    }
}

/* BURSTS */

function createBurst(){

    const amount =
        3 + Math.floor(Math.random()*3);

    for(let i=0;i<amount;i++){

        const x =
            Math.random() * canvas.width;

        particles.push(
            new Ember(
                x,
                threadY(x)
            )
        );
    }
}

setInterval(() => {

    createBurst();

}, 5000);

/* DRAW THREAD */

function drawThread(){

    const segments = 500;

    /* SUBTLE ORANGE HALO */

    ctx.beginPath();

    for(let i=0;i<=segments;i++){

        const x =
            canvas.width * i / segments;

        const y =
            threadY(x);

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle =
        "rgba(255,140,60,0.12)";

    ctx.lineWidth = 2;

    ctx.shadowColor =
        "rgba(255,120,50,0.5)";

    ctx.shadowBlur = 6;

    ctx.stroke();

    /* INNER RED GLOW */

    ctx.beginPath();

    for(let i=0;i<=segments;i++){

        const x =
            canvas.width * i / segments;

        const y =
            threadY(x);

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle =
        "rgba(255,60,60,0.4)";

    ctx.lineWidth = 1.2;

    ctx.shadowColor =
        "#ff3333";

    ctx.shadowBlur = 3;

    ctx.stroke();

    /* THREAD CORE */

    ctx.beginPath();

    for(let i=0;i<=segments;i++){

        const x =
            canvas.width * i / segments;

        const y =
            threadY(x);

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "#ff2a2a";

    ctx.lineWidth = 0.45;

    ctx.shadowBlur = 0;

    ctx.stroke();
}

function animate(){

    requestAnimationFrame(animate);

    t += 0.006;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawThread();

    for(
        let i = particles.length - 1;
        i >= 0;
        i--
    ){

        const p = particles[i];

        p.update();
        p.draw();

        if(p.life <= 0){

            particles.splice(i,1);
        }
    }
}

animate();

</script>

</body>
</html>
