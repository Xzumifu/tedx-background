<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();

window.addEventListener("resize",resize);

let t = 0;

const particles = [];

/* THREAD */

function threadY(x){

    return canvas.height * 0.5

        + Math.sin(x * 0.004 + t) * 3

        + Math.sin(x * 0.01 + t * 0.6) * 1.5;
}

/* PARTICLES */

class Ember{

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.side =
            Math.random() < 0.5 ? -1 : 1;

        this.vx =
            (Math.random()-0.5) * 0.05;

        this.vy =
            this.side *
            (0.05 + Math.random()*0.08);

        this.life = 1;

        this.size =
            1 + Math.random()*1.5;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.life -= 0.002;
    }

    draw(){

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowColor = "#ff6622";
        ctx.shadowBlur = 12;

        ctx.fillStyle = "#ff8844";

        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );
        ctx.fill();

        ctx.restore();
    }
}

/* BURST SYSTEM */

function createBurst(){

    const amount =
        3 + Math.floor(Math.random()*3);

    for(let i=0;i<amount;i++){

        const x =
            Math.random()*canvas.width;

        particles.push(
            new Ember(
                x,
                threadY(x)
            )
        );
    }
}

/* TESTING */

setInterval(()=>{

    createBurst();

},5000);

/* DRAW THREAD */

function drawThread(){

    const segments = 400;

    /* BIG ORANGE GLOW */

    ctx.beginPath();

    for(let i=0;i<=segments;i++){

        const x =
            canvas.width *
            i/segments;

        const y =
            threadY(x);

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle =
        "rgba(255,120,40,0.35)";

    ctx.lineWidth = 6;

    ctx.shadowColor =
        "#ff6622";

    ctx.shadowBlur = 20;

    ctx.stroke();

    /* RED CORE */

    ctx.beginPath();

    for(let i=0;i<=segments;i++){

        const x =
            canvas.width *
            i/segments;

        const y =
            threadY(x);

        if(i===0)
            ctx.moveTo(x,y);
        else
            ctx.lineTo(x,y);
    }

    ctx.strokeStyle =
        "#ff2222";

    ctx.lineWidth = 1.2;

    ctx.shadowBlur = 0;

    ctx.stroke();
}

function animate(){

    requestAnimationFrame(animate);

    t += 0.002;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawThread();

    for(
        let i = particles.length-1;
        i >= 0;
        i--
    ){

        particles[i].update();
        particles[i].draw();

        if(
            particles[i].life <= 0
        ){
            particles.splice(i,1);
        }
    }
}

animate();

</script>
</body>
</html>
