<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untold Narratives Thread</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let time = 0;

const particles = [];

/* -------------------------
   Random Burst Timer
------------------------- */

let nextBurst =
    performance.now() +
    (10000 + Math.random() * 20000);

/* -------------------------
   Thread Shape
------------------------- */

function threadY(x) {

    const centerY = canvas.height * 0.5;

    return centerY
        + Math.sin(x * 0.015 + time * 1.2) * 2
        + Math.sin(x * 0.004 + time * 0.5) * 4
        + Math.sin(x * 0.03 + time * 1.8) * 0.75;
}

/* -------------------------
   Particle
------------------------- */

class Particle {

    constructor(x, y, direction) {

        this.x = x;
        this.y = y;

        this.vx =
            (Math.random() - 0.5) * 0.08;

        this.vy =
            direction *
            (0.05 + Math.random() * 0.08);

        this.life = 1;

        this.decay =
            0.001 +
            Math.random() * 0.0008;

        this.size =
            0.8 +
            Math.random() * 1.2;
    }

    update() {

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.998;

        this.life -= this.decay;
    }

    draw() {

        ctx.save();

        ctx.globalAlpha = this.life;

        ctx.shadowColor = "#ff5522";
        ctx.shadowBlur = 6;

        ctx.fillStyle = "#ff7744";

        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );
        ctx.fill();

        ctx.restore();
    }
}

/* -------------------------
   Particle Burst
------------------------- */

function createBurst() {

    const count =
        3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < count; i++) {

        const x =
            Math.random() * canvas.width;

        const y =
            threadY(x);

        const direction =
            Math.random() < 0.5 ? -1 : 1;

        particles.push(
            new Particle(
                x,
                y,
                direction
            )
        );
    }
}

/* -------------------------
   Draw Thread
------------------------- */

function drawThread() {

    const segments = 500;

    /* Outer warm glow */

    ctx.save();

    ctx.beginPath();

    for (let i = 0; i <= segments; i++) {

        const x =
            (i / segments) * canvas.width;

        const y =
            threadY(x);

        if (i === 0)
            ctx.moveTo(x, y);
        else
            ctx.lineTo(x, y);
    }

    ctx.strokeStyle =
        "rgba(255,120,40,0.35)";

    ctx.lineWidth = 4;

    ctx.shadowColor =
        "rgba(255,120,40,0.8)";

    ctx.shadowBlur = 12;

    ctx.stroke();

    ctx.restore();

    /* Mid glow */

    ctx.save();

    ctx.beginPath();

    for (let i = 0; i <= segments; i++) {

        const x =
            (i / segments) * canvas.width;

        const y =
            threadY(x);

        if (i === 0)
            ctx.moveTo(x, y);
        else
            ctx.lineTo(x, y);
    }

    ctx.strokeStyle =
        "rgba(255,70,50,0.6)";

    ctx.lineWidth = 2;

    ctx.shadowColor =
        "#ff5522";

    ctx.shadowBlur = 6;

    ctx.stroke();

    ctx.restore();

    /* Bright thread core */

    ctx.beginPath();

    for (let i = 0; i <= segments; i++) {

        const x =
            (i / segments) * canvas.width;

        const y =
            threadY(x);

        if (i === 0)
            ctx.moveTo(x, y);
        else
            ctx.lineTo(x, y);
    }

    ctx.strokeStyle =
        "#ff2a2a";

    ctx.lineWidth = 0.8;

    ctx.stroke();
}

/* -------------------------
   Animation
------------------------- */

function animate() {

    requestAnimationFrame(animate);

    time += 0.002;

    const now =
        performance.now();

    if (now > nextBurst) {

        createBurst();

        nextBurst =
            now +
            (10000 + Math.random() * 20000);
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawThread();

    for (
        let i = particles.length - 1;
        i >= 0;
        i--
    ) {

        const p =
            particles[i];

        p.update();
        p.draw();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

animate();

</script>

</body>
</html>
