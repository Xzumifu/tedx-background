<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink Fluid Background</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera =
new THREE.OrthographicCamera(
    -1,1,
     1,-1,
     0.1,10
);

camera.position.z = 1;

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    window.devicePixelRatio
);

document.body.appendChild(
    renderer.domElement
);

const uniforms = {

    uTime:{
        value:0
    },

    uMouse:{
        value:new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uVelocity:{
        value:new THREE.Vector2(
            0,
            0
        )
    }

};

const material =
new THREE.ShaderMaterial({

uniforms,

vertexShader:`

varying vec2 vUv;

void main(){

    vUv = uv;

    gl_Position =
        vec4(
            position,
            1.0
        );

}

`,

fragmentShader:`

precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVelocity;

varying vec2 vUv;

float hash(vec2 p){

    return fract(
        sin(
            dot(
                p,
                vec2(
                    127.1,
                    311.7
                )
            )
        )*43758.5453123
    );

}

float noise(vec2 p){

    vec2 i=floor(p);
    vec2 f=fract(p);

    float a=hash(i);
    float b=hash(i+vec2(1.,0.));
    float c=hash(i+vec2(0.,1.));
    float d=hash(i+vec2(1.,1.));

    vec2 u=
        f*f*(3.-2.*f);

    return
        mix(a,b,u.x)
        +
        (c-a)*u.y*(1.-u.x)
        +
        (d-b)*u.x*u.y;

}

/* curl vector field */
vec2 curl(vec2 p){
    float e = 0.0005;

    float n1 = noise(p + vec2(0, e));
    float n2 = noise(p - vec2(0, e));
    float a = (n1 - n2) / (2.0 * e);

    float n3 = noise(p + vec2(e, 0));
    float n4 = noise(p - vec2(e, 0));
    float b = (n3 - n4) / (2.0 * e);

    return normalize(vec2(a, -b));
}

float fbm(vec2 p){

    float v=0.0;
    float a=0.5;

    for(int i=0;i<7;i++){

        v+=a*noise(p);

        p*=2.0;

        a*=0.5;
    }

    return v;

}

void main(){

    vec2 uv = vUv;

    float t =
        uTime * 0.2;

    vec2 p =
        uv * 0.22;

    vec2 warp = vec2(

        fbm(
            p*2.0 +
            vec2(
                t,
                0.0
            )
        ),

        fbm(
            p*2.0 -
            vec2(
                t,
                0.0
            )
        )

    );

    p +=
        warp * 1.6;

    vec2 away =
        uv - uMouse;

    float dist =
        length(
            away
        );

    p +=

        normalize(
            away +
            0.0001
        )

        *

        exp(
            -dist * 10.0
        )

        *

        length(
            uVelocity
        )

        *

        0.15;

    float field =

        fbm(
            p +
            vec2(
                t*0.3,
                t*0.15
            )
        );

    field +=

        0.5 *

        fbm(
            p*1.7 -
            t*0.2
        );

    field *= 0.65;

    float density =

        smoothstep(
            0.45,
            0.78,
            field
        );

    vec3 color =
        vec3(0.0);

    color +=

        vec3(
            0.03,
            0.0,
            0.0
        )

        *

        density;

    color +=

        vec3(
            0.12,
            0.01,
            0.01
        )

        *

        pow(
            density,
            2.0
        );

    color *= 0.8;

    gl_FragColor =
        vec4(
            color,
            1.0
        );

}

`

});

scene.add(

    new THREE.Mesh(
        new THREE.PlaneGeometry(
            2,
            2
        ),
        material
    )

);

let target =
new THREE.Vector2(
    0.5,
    0.5
);

let previous =
new THREE.Vector2(
    0.5,
    0.5
);

window.addEventListener(
    "mousemove",
    e=>{

        const mx =
            e.clientX /
            window.innerWidth;

        const my =
            1 -
            e.clientY /
            window.innerHeight;

        uniforms.uVelocity.value.x = (mx - previous.x) * 5.0;
    uniforms.uVelocity.value.y = (my - previous.y) * 5.0;
        );

        previous.set(
            mx,
            my
        );

        target.set(
            mx,
            my
        );

    }
);

window.addEventListener(
    "resize",
    ()=>{

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

function animate(){

  requestAnimationFrame(animate);

    uniforms.uTime.value += 0.016;

    uniforms.uMouse.value.lerp(target, 0.08);

    uniforms.uVelocity.value.multiplyScalar(0.92);

    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
