<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TEDx-style Fluid Ink</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
}
canvas{ display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* ---------------- CORE SETUP ---------------- */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* ---------------- UNIFORMS ---------------- */

const uniforms = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0.5,0.5) },
    uVelocity: { value: new THREE.Vector2(0,0) }
};

/* ---------------- SHADER ---------------- */

const material = new THREE.ShaderMaterial({

uniforms,

vertexShader: `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`,

fragmentShader: `
precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVelocity;

varying vec2 vUv;

/* ---------------- SMOOTH NOISE ---------------- */

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);

    vec2 u = f*f*(3.0-2.0*f);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

/* ---------------- CURL FIELD ---------------- */

vec2 curl(vec2 p){
    float e = 0.001;

    float n1 = noise(p + vec2(0,e));
    float n2 = noise(p - vec2(0,e));
    float a = (n1 - n2);

    float n3 = noise(p + vec2(e,0));
    float n4 = noise(p - vec2(e,0));
    float b = (n3 - n4);

    return vec2(a,-b);
}

/* ---------------- MAIN ---------------- */

void main(){

    vec2 uv = vUv;

    float t = uTime * 0.15;   /* SLOW = TEDx feel */

    /* large-scale flow field */
    vec2 p = uv * 2.8;

    vec2 flow = curl(p + t);

    /* smooth advection (important difference) */
    p += flow * 0.6;

    /* mouse = gentle distortion, not force explosion */
    vec2 d = uv - uMouse;
    float dist = length(d);

    vec2 mouseForce = normalize(d + 0.0001) * exp(-dist * 8.0);

    p += mouseForce * (0.6 + length(uVelocity) * 0.8);

    /* secondary slow drift (NOT turbulence-heavy) */
    p += curl(p * 1.1 - t) * 0.12;

    /* ---------------- DYE FIELD ---------------- */

    float ink =
        noise(p * 1.2 + t) * 0.6 +
        noise(p * 2.0 - t) * 0.4;

    /* soft shaping (no harsh cutoffs) */
    ink = smoothstep(0.25, 0.78, ink);
    ink = pow(ink, 1.1);

    /* ---------------- ATMOSPHERIC FADE ---------------- */

    float center = length(uv - 0.5);
    float atmosphere = smoothstep(1.2, 0.2, center);

    /* ---------------- COLOR (TEDx STYLE) ---------------- */

    vec3 col = vec3(0.0);

/* base ink body */
col += vec3(0.12, 0.02, 0.02) * ink;

/* soft red liquid core */
col += vec3(0.55, 0.04, 0.04) * pow(ink, 2.0);

/* grey diffusion layer (KEY TEDx LOOK) */
float haze = smoothstep(0.15, 0.95, ink);
col += vec3(0.18, 0.18, 0.18) * haze * 0.22;

/* subtle lift so it feels volumetric */
col += 0.02;

/* apply atmospheric falloff */
col *= atmosphere;

/* gentle contrast shaping */
col = pow(col, vec3(0.95));

gl_FragColor = vec4(col,1.0);
}
`,

});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

/* ---------------- MOUSE ---------------- */

let target = new THREE.Vector2(0.5,0.5);
let prev = new THREE.Vector2(0.5,0.5);

window.addEventListener("mousemove", (e)=>{

    let mx = e.clientX / window.innerWidth;
    let my = 1 - e.clientY / window.innerHeight;

    uniforms.uVelocity.value.x = (mx - prev.x) * 4.0;
    uniforms.uVelocity.value.y = (my - prev.y) * 4.0;

    prev.set(mx,my);
    target.set(mx,my);
});

/* ---------------- RESIZE ---------------- */

window.addEventListener("resize",()=>{
    renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------------- LOOP ---------------- */

function animate(){
    requestAnimationFrame(animate);

    uniforms.uTime.value += 0.016;

    uniforms.uMouse.value.lerp(target, 0.06);
    uniforms.uVelocity.value.multiplyScalar(0.9);

    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
