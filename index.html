<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEDx Fluid Energy</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.OrthographicCamera(
    -1,
    1,
    1,
    -1,
    0.1,
    10
);

camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio, 2)
);

document.body.appendChild(
    renderer.domElement
);

const uniforms = {

    uTime: {
        value: 0
    },

    uMouse: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail1: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail2: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    },

    uTrail3: {
        value: new THREE.Vector2(
            0.5,
            0.5
        )
    }

};

const material =
new THREE.ShaderMaterial({

uniforms,

vertexShader: `

varying vec2 vUv;

void main(){

    vUv = uv;

    gl_Position =
        vec4(
            position,
            1.0
        );

}

`,

fragmentShader: `

precision highp float;

uniform float uTime;

uniform vec2 uMouse;
uniform vec2 uTrail1;
uniform vec2 uTrail2;
uniform vec2 uTrail3;

varying vec2 vUv;

float hash(vec2 p){

    return fract(
        sin(
            dot(
                p,
                vec2(
                    127.1,
                    311.7
                )
            )
        ) * 43758.5453123
    );

}

float noise(vec2 p){

    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i + vec2(1.0,0.0));
    float c = hash(i + vec2(0.0,1.0));
    float d = hash(i + vec2(1.0,1.0));

    vec2 u =
        f*f*(3.0-2.0*f);

    return mix(a,b,u.x)
        +(c-a)*u.y*(1.0-u.x)
        +(d-b)*u.x*u.y;

}

float fbm(vec2 p){

    float v = 0.0;
    float a = 0.5;

    for(int i=0;i<6;i++){

        v += a*noise(p);

        p *= 2.0;

        a *= 0.5;

    }

    return v;

}

float reveal(
    vec2 uv,
    vec2 point,
    float radius
){

    float d =
        distance(
            uv,
            point
        );

    return exp(
        -d * radius
    );

}

void main(){

    vec2 uv = vUv;

    float t =
        uTime * 0.18;

    vec2 p =
        uv * 3.5;

    p.x +=
        sin(
            p.y * 2.5
            + t * 2.0
        ) * 0.9;

    p.y +=
        cos(
            p.x * 2.5
            - t * 2.0
        ) * 0.9;

    p += vec2(
        sin(t + p.y),
        cos(t + p.x)
    ) * 0.35;

    float flow =
        fbm(p+t)
        *
        fbm(
            p*1.7-t
        );

    float revealMask =

        reveal(
            uv,
            uMouse,
            9.0
        )

        +

        reveal(
            uv,
            uTrail1,
            6.0
        ) * 0.8

        +

        reveal(
            uv,
            uTrail2,
            4.5
        ) * 0.6

        +

        reveal(
            uv,
            uTrail3,
            3.0
        ) * 0.4;

    float distortion =

        fbm(
            uv * 8.0
            + t * 2.0
        );

    revealMask *=
        0.5 +
        distortion;

    flow *= revealMask;

    flow =
        smoothstep(
            0.15,
            0.85,
            flow
        );

    vec3 color =
        vec3(0.0);

    color +=
        vec3(
            0.4,
            0.0,
            0.0
        ) * flow;

    color +=
        vec3(
            1.8,
            0.04,
            0.04
        ) *
        pow(
            flow,
            2.0
        );

    float crest =

        smoothstep(
            0.65,
            0.9,
            flow
        );

    color +=
        vec3(
            3.0,
            0.15,
            0.15
        ) *
        crest *
        0.5;

    gl_FragColor =
        vec4(
            color,
            1.0
        );

}

`

});

const plane =
new THREE.Mesh(
    new THREE.PlaneGeometry(
        2,
        2
    ),
    material
);

scene.add(plane);

let target =
new THREE.Vector2(
    0.5,
    0.5
);

window.addEventListener(
    "mousemove",
    e => {

        target.set(
            e.clientX /
            window.innerWidth,

            1 -
            e.clientY /
            window.innerHeight
        );

    }
);

window.addEventListener(
    "resize",
    () => {

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

function animate(){

    requestAnimationFrame(
        animate
    );

    uniforms.uTime.value += 0.01;

    uniforms.uTrail3.value.lerp(
        uniforms.uTrail2.value,
        0.03
    );

    uniforms.uTrail2.value.lerp(
        uniforms.uTrail1.value,
        0.04
    );

    uniforms.uTrail1.value.lerp(
        uniforms.uMouse.value,
        0.06
    );

    uniforms.uMouse.value.lerp(
        target,
        0.09
    );

    renderer.render(
        scene,
        camera
    );

}

animate();

</script>

</body>
</html>
