<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing Thread</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let time = 0;
const particles = [];

class Particle {
    constructor(x,y,direction){

    this.x = x;
    this.y = y;

    this.direction = direction;

    this.vx =
        (Math.random()-0.5)*0.1;

    this.vy =
        direction *
        (0.08 + Math.random()*0.12);

    this.life = 1;

    this.decay =
        0.001 +
        Math.random()*0.001;

    this.size =
        0.8 +
        Math.random()*1.5;
}

    update() {
        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.995;
        this.life -= this.decay;
    }

    draw() {
        const alpha = Math.max(this.life, 0);

        ctx.save();

        ctx.globalAlpha = alpha;

        ctx.shadowColor = "#ff2222";
        ctx.shadowBlur = 6;

        ctx.fillStyle = "#ff4444";

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

function threadY(x) {
    const centerY = canvas.height * 0.5;

    return centerY
        + Math.sin(x * 0.015 + time * 1.2) * 4
        + Math.sin(x * 0.004 + time * 0.5) * 8
        + Math.sin(x * 0.03 + time * 1.8) * 1.5;
}

function spawnParticles() {

    for (let i = 0; i < 3; i++) {

        if (Math.random() < 0.35) {

            const x = Math.random() * canvas.width;
            const y = threadY(x);

            particles.push(new Particle(x, y));
        }
    }
}

function drawThread() {

    ctx.save();

    ctx.beginPath();

    const segments = 500;

    for (let i = 0; i <= segments; i++) {

        const x = (i / segments) * canvas.width;
        const y = threadY(x);

        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
    }

    ctx.shadowColor = "#ff0000";
    ctx.shadowBlur = 15;

    ctx.strokeStyle = "#ff2a2a";
    ctx.lineWidth = 1;

    ctx.stroke();

    ctx.restore();
}

function animate() {

    requestAnimationFrame(animate);

    time += 0.002;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawThread();

    function createBurst() {

    const count = 3 + Math.floor(Math.random() * 3);

    for(let i = 0; i < count; i++) {

        const x = Math.random() * canvas.width;
        const y = threadY(x);

        particles.push(
            new Particle(
                x,
                y,
                Math.random() < 0.5 ? -1 : 1
            )
        );
    }
}

    let nextBurst =
    performance.now() +
    (10000 + Math.random() * 20000);

    for (let i = particles.length - 1; i >= 0; i--) {

        const p = particles[i];

        p.update();
        p.draw();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

animate();

    const now = performance.now();

if(now > nextBurst){

    createBurst();

    nextBurst =
        now +
        (10000 + Math.random()*20000);
}
</script>

</body>
</html>
