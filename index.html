<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fluid Fix</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
}
canvas{ display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* ---------------- BASIC SETUP ---------------- */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* ---------------- SAFE SINGLE FEEDBACK PAIR ---------------- */

const rtA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const rtB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

let prev = rtA;
let curr = rtB;

/* ---------------- UNIFORMS ---------------- */

const U = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0.5,0.5) },
    uVel: { value: new THREE.Vector2(0,0) },
    uPrev: { value: null }
};

/* ---------------- SHADER ---------------- */

const mat = new THREE.ShaderMaterial({

uniforms: U,

vertexShader: `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`,

fragmentShader: `
precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVel;
uniform sampler2D uPrev;

varying vec2 vUv;

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

void main(){

    vec2 uv = vUv;
    float t = uTime * 0.1;

    /* ---------------- ALWAYS READ PREVIOUS FRAME ---------------- */

    vec3 prevCol = texture2D(uPrev, uv).rgb;

    /* ---------------- FLOW ---------------- */

    vec2 p = uv * 2.0;

    vec2 flow = vec2(
        noise(p + t),
        noise(p - t)
    ) - 0.5;

    p += flow * 0.4;

    /* ---------------- CURSOR ---------------- */

    vec2 d = uv - uMouse;
    float dist = length(d);
    float influence = exp(-dist * dist * 6.0);

    vec2 swirl = vec2(-d.y, d.x);
    p += swirl * influence * 0.2;

    /* ---------------- INK ---------------- */

    float ink = noise(p + t);

    ink = smoothstep(0.4, 0.75, ink);

    /* IMPORTANT: prevent fog collapse */
    ink = pow(ink, 0.9);

    vec3 fresh = vec3(0.0);

/* wispy */
fresh += vec3(0.10) * ink * 0.6;

/* red core (controlled) */
fresh += vec3(0.5,0.05,0.05) * pow(ink,1.6);

/* ---------------- COMPOSITION (CRITICAL FIX) ---------------- */

vec3 col = prevCol * 0.92 + fresh * 0.08;

/* safety brightness clamp */
col = max(col, vec3(0.0));

/* vignette */
float d2 = length(uv - 0.5);
col *= smoothstep(1.2, 0.2, d2);

/* tiny lift so it NEVER goes black */
col += 0.01;

gl_FragColor = vec4(col,1.0);
}
`
});

/* ---------------- QUAD ---------------- */

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));

/* ---------------- MOUSE ---------------- */

let prevM = new THREE.Vector2();
let target = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{

    let mx = e.clientX / window.innerWidth;
    let my = 1 - e.clientY / window.innerHeight;

    U.uVel.value.x = (mx - prevM.x) * 5;
    U.uVel.value.y = (my - prevM.y) * 5;

    prevM.set(mx,my);
    target.set(mx,my);
});

/* ---------------- LOOP ---------------- */

function animate(){

    requestAnimationFrame(animate);

    U.uTime.value += 0.016;

    U.uMouse.value.lerp(target, 0.05);
    U.uVel.value.multiplyScalar(0.92);

    /* IMPORTANT: ALWAYS DEFINE PREV */
    U.uPrev.value = prev.texture;

    renderer.setRenderTarget(curr);
    renderer.render(scene,camera);

    renderer.setRenderTarget(null);
    renderer.render(scene,camera);

    let temp = prev;
    prev = curr;
    curr = temp;
}

animate();

</script>

</body>
</html>
