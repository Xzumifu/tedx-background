<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waving Red Thread</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let time = 0;

function draw() {
    time += 0.008;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerY = canvas.height * 0.5;

    ctx.beginPath();

    const segments = 400;

    for (let i = 0; i <= segments; i++) {

        const x = (i / segments) * canvas.width;

        const wave1 =
            Math.sin(i * 0.04 + time * 1.0) * 6;

        const wave2 =
            Math.sin(i * 0.015 + time * 0.5) * 3;

        const wave3 =
            Math.sin(i * 0.08 + time * 1.4) * 1.5;

        const y = centerY + wave1 + wave2 + wave3;

        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
    }

    ctx.strokeStyle = "#ff1a1a";
    ctx.lineWidth = 1;
    ctx.lineCap = "round";
    ctx.stroke();

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
