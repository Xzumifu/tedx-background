<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wispy Ink Fluid</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* -------------------------
   SETUP
------------------------- */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* -------------------------
   UNIFORMS
------------------------- */

const uniforms = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0.5,0.5) },
    uVelocity: { value: new THREE.Vector2(0,0) }
};

/* -------------------------
   SHADER
------------------------- */

const material = new THREE.ShaderMaterial({

uniforms,

vertexShader: `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`,

fragmentShader: `
precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVelocity;

varying vec2 vUv;

/* -------------------------
   NOISE
------------------------- */

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

/* curl field */
vec2 curl(vec2 p){
    float e = 0.001;

    float n1 = noise(p + vec2(0,e));
    float n2 = noise(p - vec2(0,e));
    float a = (n1 - n2);

    float n3 = noise(p + vec2(e,0));
    float n4 = noise(p - vec2(e,0));
    float b = (n3 - n4);

    return normalize(vec2(a,-b));
}

/* -------------------------
   MAIN
------------------------- */

void main(){

    vec2 uv = vUv;
    float t = uTime * 0.22;

    vec2 p = uv * 3.6;

    /* smooth flow */
    vec2 flow = curl(p + t);
    p += flow * 0.55;

    /* mouse force */
    vec2 d = uv - uMouse;
    float dist = length(d);

    vec2 push = normalize(d + 0.0001) * exp(-dist * 10.0);
    p += push * (0.9 + length(uVelocity));

    /* secondary drift */
    p += curl(p * 1.4 - t) * 0.18;

    /* ink density */
    float ink = noise(p + flow * 2.0);
    ink += 0.4 * noise(p * 2.2 - t);

    ink = smoothstep(0.35, 0.78, ink);
    ink = pow(ink, 0.85);

    float vignette = smoothstep(1.2, 0.25, length(uv - 0.5));

    /* -------------------------
       COLOR (GREY FADE SYSTEM)
    ------------------------- */

    vec3 col = vec3(0.0);

/* --- 1. core red ink (soft) --- */
col += vec3(0.22, 0.02, 0.02) * ink;

/* --- 2. mid haze layer (IMPORTANT GREY TRANSITION) --- */
float haze = smoothstep(0.2, 0.9, ink);
col += vec3(0.18, 0.18, 0.18) * haze * 0.35;

/* --- 3. subtle red depth --- */
col += vec3(0.45, 0.03, 0.03) * pow(ink, 2.0);

/* --- 4. soften into black instead of hard cutoff --- */
float fade = smoothstep(0.0, 0.9, ink);
col *= fade;

/* --- 5. cinematic vignette --- */
col *= vignette;

/* --- 6. overall softness --- */
col *= 0.95;

/* gentle lift so blacks aren't crushed */
col += vec3(0.02);

    gl_FragColor = vec4(col,1.0);
}
`,

});

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

/* -------------------------
   MOUSE
------------------------- */

let target = new THREE.Vector2(0.5,0.5);
let prev = new THREE.Vector2(0.5,0.5);

window.addEventListener("mousemove", (e)=>{

    let mx = e.clientX / window.innerWidth;
    let my = 1 - e.clientY / window.innerHeight;

    uniforms.uVelocity.value.x = (mx - prev.x) * 5.0;
    uniforms.uVelocity.value.y = (my - prev.y) * 5.0;

    prev.set(mx,my);
    target.set(mx,my);
});

/* -------------------------
   RESIZE
------------------------- */

window.addEventListener("resize", ()=>{
    renderer.setSize(window.innerWidth, window.innerHeight);
});

/* -------------------------
   LOOP
------------------------- */

function animate(){
    requestAnimationFrame(animate);

    uniforms.uTime.value += 0.016;

    uniforms.uMouse.value.lerp(target, 0.08);
    uniforms.uVelocity.value.multiplyScalar(0.92);

    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
