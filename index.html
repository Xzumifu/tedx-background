<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fluid Ink + Repulsion</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#000;
}
canvas{ display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* =======================
   SETUP
======================= */

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* =======================
   FEEDBACK
======================= */

const rtA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const rtB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

let prev = rtA;
let curr = rtB;

/* =======================
   UNIFORMS
======================= */

const U = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0.5,0.5) },
    uVel: { value: new THREE.Vector2(0,0) },
    uPrev: { value: null }
};

/* =======================
   SHADER
======================= */

const mat = new THREE.ShaderMaterial({

uniforms: U,

vertexShader: `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`,

fragmentShader: `
precision highp float;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uVel;
uniform sampler2D uPrev;

varying vec2 vUv;

/* =======================
   NOISE + CURL
======================= */

float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453);
}

float noise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);

    vec2 u = f*f*(3.0-2.0*f);

    float a = hash(i);
    float b = hash(i+vec2(1.,0.));
    float c = hash(i+vec2(0.,1.));
    float d = hash(i+vec2(1.,1.));

    return mix(a,b,u.x) +
           (c-a)*u.y*(1.0-u.x) +
           (d-b)*u.x*u.y;
}

vec2 curl(vec2 p){
    float e = 0.0012;

    float n1 = noise(p + vec2(0,e));
    float n2 = noise(p - vec2(0,e));
    float a = n1 - n2;

    float n3 = noise(p + vec2(e,0));
    float n4 = noise(p - vec2(e,0));
    float b = n3 - n4;

    return vec2(a,-b);
}

/* =======================
   MAIN
======================= */

void main(){

    vec2 uv = vUv;
    float t = uTime * 0.09;

    vec3 prevCol = texture2D(uPrev, uv).rgb;

    vec2 p = uv * 2.2;

    vec2 flow = curl(p + t);

    /* slight global drift (prevents center collapse) */
    flow += vec2(0.05, -0.02);

    p += flow * 0.42;

    /* =======================
       CURSOR REPULSION (NEW CORE FIX)
    ======================= */

    vec2 d = uv - uMouse;
    float dist = length(d);

    /* soft bubble field */
    float bubble = exp(-dist * dist * 10.0);

    /* outward pressure force */
    vec2 repelDir = normalize(d + 0.0001);

    /* tangential swirl around bubble edge */
    vec2 swirl = vec2(-d.y, d.x);

    /* COMBINE: push + swirl */
    p += repelDir * bubble * 0.55;   // MAIN REPULSION
    p += swirl * bubble * 0.22;      // FLUID ROLLING

    /* velocity interaction */
    p += uVel * bubble * 0.12;

    /* =======================
       INK FIELD
    ======================= */

    float base = noise(p + t);
    float detail = noise(p * 2.8 - t);

    float ink = base * 0.65 + detail * 0.35;

    ink = smoothstep(0.38, 0.78, ink);
    ink = pow(ink, 0.92);

    /* breakup to avoid blobs */
    float breakup = noise(p * 3.2 - t);
    ink *= mix(0.7, 1.2, breakup);

    /* =======================
       COLOR
    ======================= */

    vec3 fresh = vec3(0.0);

/* wispy ink */
fresh += vec3(0.10,0.09,0.09) * ink * 0.75;

/* controlled red core */
fresh += vec3(0.52,0.05,0.05) * pow(ink,1.7);

/* soft grey diffusion */
float haze = smoothstep(0.2,0.85,ink);
fresh += vec3(0.15) * haze * 0.15;

/* =======================
   FEEDBACK
======================= */

vec3 col = prevCol * 0.90 + fresh * 0.10;

/* remove center buildup */
float center = length(uv - 0.5);
col *= smoothstep(1.25, 0.25, center);

/* safety lift */
col += 0.012;

gl_FragColor = vec4(col,1.0);
}
`
});

/* =======================
   SCENE
======================= */

scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));

/* =======================
   MOUSE
======================= */

let prevM = new THREE.Vector2();
let target = new THREE.Vector2();

window.addEventListener("mousemove",(e)=>{

    let mx = e.clientX / window.innerWidth;
    let my = 1 - e.clientY / window.innerHeight;

    U.uVel.value.x = (mx - prevM.x) * 4.5;
    U.uVel.value.y = (my - prevM.y) * 4.5;

    prevM.set(mx,my);
    target.set(mx,my);
});

/* =======================
   LOOP
======================= */

function animate(){

    requestAnimationFrame(animate);

    U.uTime.value += 0.016;

    U.uMouse.value.lerp(target,0.05);
    U.uVel.value.multiplyScalar(0.92);

    U.uPrev.value = prev.texture;

    renderer.setRenderTarget(curr);
    renderer.render(scene,camera);

    renderer.setRenderTarget(null);
    renderer.render(scene,camera);

    let tmp = prev;
    prev = curr;
    curr = tmp;
}

animate();

</script>

</body>
</html>
